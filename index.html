            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

                osc.frequency.setValueAtTime(659.25, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1046.50, audioCtx.currentTime + 0.1);

                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);

                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);

            { text: "在人名「愛迪生」的左側或下方要加什麼符號？", options: ["專名號", "書名號", "引號", "破折號"], answer: "專名號" }

            // --- 省略號 / 刪節號 (共20題) ---
            { text: "他結結巴巴地說：「我（ ）我不是故意的。」", options: ["……", "——", "，", "。"], answer: "……" },
            { text: "這座花園裡有玫瑰、百合、向日葵（ ）真是美不勝收。", options: ["……", "——", "。", "！"], answer: "……" },
            { text: "老爺爺嘆了一口氣，說：「唉，那都是過去的事了（ ）」", options: ["……", "——", "？", "、"], answer: "……" },
            { text: "媽媽生氣地指著我說：「你這孩子，真是（ ）」", options: ["……", "——", "。", "，"], answer: "……" },
            { text: "動物園裡有大象、長頸鹿、獅子（ ）好幾十種動物。", options: ["……", "——", "。", "！"], answer: "……" },
            { text: "他氣喘吁吁地跑過來：「快（ ）快報警！」", options: ["……", "——", "，", "。"], answer: "……" },
            { text: "這裡的風景太美了，有山、有水、有花（ ）", options: ["……", "——", "。", "！"], answer: "……" },
            { text: "我好想去遊樂園玩，可是（ ）", options: ["……", "——", "。", "！"], answer: "……" },
            { text: "他欲言又止：「其實這件事的真相是（ ）算了我還是別說了。」", options: ["……", "——", "，", "。"], answer: "……" },
            { text: "菜市場裡賣著各種蔬菜：高麗菜、菠菜、紅蘿蔔（ ）", options: ["……", "——", "。", "！"], answer: "……" },
            { text: "老師說：「大家要記住，一寸光陰（ ）」", options: ["……", "——", "。", "！"], answer: "……" },
            { text: "小紅低著頭，小聲地說：「對不起，我（ ）我忘記帶作業了。」", options: ["……", "——", "，", "。"], answer: "……" },
            { text: "說到這個，他突然停了下來，望著窗外發呆（ ）", options: ["……", "——", "。", "！"], answer: "……" },
            { text: "桌上擺滿了美食，有烤雞、披薩、義大利麵（ ）讓人看了口水直流。", options: ["……", "——", "。", "！"], answer: "……" },
            { text: "「救（ ）救命啊！」他在水裡大聲呼喊。", options: ["……", "——", "，", "。"], answer: "……" },
            { text: "妹妹看著櫥窗裡的洋娃娃，嘴裡念著：「如果我能有一個（ ）」", options: ["……", "——", "。", "！"], answer: "……" },
            { text: "故事的結尾寫著：「從此，王子與公主過著幸福快樂的日子（ ）」", options: ["……", "——", "？", "！"], answer: "……" },
            { text: "字典裡收錄了很多詞彙，例如：開心、難過、生氣（ ）", options: ["……", "——", "。", "！"], answer: "……" },
            { text: "他嚇得全身發抖：「那裡有一隻（ ）一隻大怪物！」", options: ["……", "——", "，", "。"], answer: "……" },
            { text: "圓周率的值是 3.14159（ ）一直延伸下去。", options: ["……", "——", "。", "！"], answer: "……" }
        ];

        // 玩家 hp 從 100 改為 5 (5顆愛心)
        const gameState = {
            p1: { hp: 5, monsterHp: 200, currentQ: null, combo: 0, timeLeft: 60, timerId: null, isGameOver: false },
            p2: { hp: 5, monsterHp: 200, currentQ: null, combo: 0, timeLeft: 60, timerId: null, isGameOver: false }
        };

        // 產生愛心字串的函數
        function renderHearts(hp) {
            return '❤️'.repeat(hp) + '🖤'.repeat(5 - hp);
        }

        // ======== 計時器邏輯 ========
        function startTimer(player) {
            clearInterval(gameState[player].timerId);
            gameState[player].timeLeft = 60;
            gameState[player].isGameOver = false;
            updateTimerUI(player);

            gameState[player].timerId = setInterval(() => {
                gameState[player].timeLeft--;
                updateTimerUI(player);

                if (gameState[player].timeLeft <= 0) {
                    endGame(player, 'timeout');
                }
            }, 1000);
        }

        function updateTimerUI(player) {
            const t = gameState[player].timeLeft;
            const m = String(Math.floor(t / 60)).padStart(2, '0');
            const s = String(t % 60).padStart(2, '0');
            const timerEl = document.getElementById(`${player}-timer`);
            
            timerEl.innerText = `${m}:${s}`;
            
            if (t <= 10 && t > 0) {
                timerEl.classList.remove('text-yellow-300');
                timerEl.classList.add('text-red-500', 'animate-pulse');
            } else {
                timerEl.classList.remove('text-red-500', 'animate-pulse');
                timerEl.classList.add('text-yellow-300');
            }
        }

        // ======== 遊戲結束邏輯 ========
        function endGame(player, reason) {
            gameState[player].isGameOver = true;
            clearInterval(gameState[player].timerId);
            const questionEl = document.getElementById(`${player}-question`);
            
            if (reason === 'win') {
                questionEl.innerHTML = "<span class='text-green-400 font-bold text-4xl'>🎉 擊敗怪獸！獲勝！</span>";
            } else if (reason === 'lose') {
                questionEl.innerHTML = "<span class='text-red-500 font-bold text-4xl'>💀 愛心耗盡！挑戰失敗...</span>";
            } else if (reason === 'timeout') {
                questionEl.innerHTML = "<span class='text-orange-500 font-bold text-4xl'>⏰ 時間到！挑戰失敗...</span>";
            }
            
            showRestartButton(player);
        }

        // ======== 出題邏輯 ========
        function nextQuestion(player) {
            if (gameState[player].isGameOver) return;
            const randomQ = questionBank[Math.floor(Math.random() * questionBank.length)];
            gameState[player].currentQ = randomQ;
            document.getElementById(`${player}-question`).innerText = randomQ.text;
            
            const optionsContainer = document.getElementById(`${player}-options`);
            optionsContainer.innerHTML = ''; 
            optionsContainer.className = "grid grid-cols-2 gap-4 mb-2";

            randomQ.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "bg-gray-700 hover:bg-gray-600 active:bg-amber-600 text-3xl font-bold py-6 rounded-xl transition transform active:scale-95 border border-gray-600 shadow-md";
                btn.innerText = opt;
                btn.addEventListener('pointerdown', () => checkAnswer(player, opt));
                optionsContainer.appendChild(btn);
            });
        }

        // ======== 答題邏輯 ========
        function checkAnswer(player, selectedOpt) {
            const state = gameState[player];
            if (state.isGameOver) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();

            if (selectedOpt === state.currentQ.answer) {
                state.combo++;
                playSound('correct');
                flashScreen(player, 'bg-green-500/20');
                const damage = 20 + (state.combo > 1 ? (state.combo - 1) * 10 : 0);
                state.monsterHp = Math.max(0, state.monsterHp - damage);
                showDamageText(player, damage);
                shakeMonster(player);
                updateComboUI(player, state.combo);
            } else {
                state.combo = 0;
                state.hp = Math.max(0, state.hp - 1); // 答錯扣 1 顆愛心
                playSound('wrong');
                flashScreen(player, 'bg-red-500/20');
                updateComboUI(player, 0);
                freezePlayer(player, 2000);
            }

            // 更新 UI：顯示愛心
            document.getElementById(`${player}-hp`).innerText = renderHearts(state.hp);
            document.getElementById(`${player}-monster-hp`).innerText = state.monsterHp;
            document.getElementById(`${player}-monster-bar`).style.width = `${(state.monsterHp / 200) * 100}%`;

            if (state.monsterHp <= 0) {
                endGame(player, 'win');
            } else if (state.hp <= 0) {
                endGame(player, 'lose');
            } else {
                nextQuestion(player);
            }
        }

        function showRestartButton(player) {
            const optionsContainer = document.getElementById(`${player}-options`);
            optionsContainer.innerHTML = ''; 
            optionsContainer.className = "flex justify-center mb-2";
            
            const btn = document.createElement('button');
            btn.className = "bg-blue-600 hover:bg-blue-500 text-white text-3xl font-bold py-6 px-10 rounded-xl transition transform active:scale-95 shadow-lg w-full border border-blue-400";
            btn.innerText = "🔄 再玩一次";
            btn.addEventListener('pointerdown', () => restartGame(player));
            optionsContainer.appendChild(btn);
        }

        function restartGame(player) {
            // 數值重置 (回復 5 顆愛心)
            gameState[player].hp = 5;
            gameState[player].monsterHp = 200;
            gameState[player].combo = 0;
            
            // UI 重置
            document.getElementById(`${player}-hp`).innerText = renderHearts(gameState[player].hp);
            document.getElementById(`${player}-monster-hp`).innerText = gameState[player].monsterHp;
            document.getElementById(`${player}-monster-bar`).style.width = '100%';
            updateComboUI(player, 0);
            
            // 重新啟動計時器與出題
            startTimer(player);
            nextQuestion(player);
        }

        function flashScreen(player, className) {
            const zone = document.getElementById(`${player}-zone`);
            zone.classList.add(className);
            setTimeout(() => zone.classList.remove(className), 200);
        }

        function shakeMonster(player) {
            const img = document.getElementById(`${player}-monster-img`);
            img.classList.remove('shake-animation');
            void img.offsetWidth; 
            img.classList.add('shake-animation');
        }

        function showDamageText(player, damage) {
            const area = document.getElementById(`${player}-monster-area`);
            const damageEl = document.createElement('div');
            damageEl.className = 'damage-text';
            damageEl.innerText = `-${damage}`;
            area.appendChild(damageEl);
            setTimeout(() => damageEl.remove(), 800);
        }

        function updateComboUI(player, comboCount) {
            const comboEl = document.getElementById(`${player}-combo-text`);
            if (comboCount >= 2) {
                comboEl.innerText = `${comboCount} 連擊! 攻擊力 UP!`;
                comboEl.style.opacity = '1';
                comboEl.classList.add('text-orange-400', 'scale-110');
            } else {
                comboEl.style.opacity = '0';
                comboEl.classList.remove('text-orange-400', 'scale-110');
            }
        }

        function freezePlayer(player, ms) {
            const options = document.getElementById(`${player}-options`);
            const freezeText = document.getElementById(`${player}-freeze-text`);
            options.classList.add('frozen-options');
            freezeText.classList.remove('hidden');
            setTimeout(() => {
                options.classList.remove('frozen-options');
                freezeText.classList.add('hidden');
            }, ms);
        }

        // 第一次點擊螢幕時啟動
        document.body.addEventListener('pointerdown', function initGame() {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            startTimer('p1');
            startTimer('p2');
            nextQuestion('p1');
            nextQuestion('p2');
            document.body.removeEventListener('pointerdown', initGame);
        }, {once: true});

    </script>
</body>
